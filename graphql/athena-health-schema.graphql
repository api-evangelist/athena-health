  accessToken: String!
  tokenType: String!
  expiresIn: Int!
  scope: String
  issuedAt: DateTime!
  expiresAt: DateTime!
  practiceId: String
  userId: String
  smartLaunchContext: JSON
}

type Webhook implements Node & Auditable {
  id: ID!
  webhookId: String!
  practiceId: String!
  name: String
  targetUrl: String!
  status: WebhookStatus!
  events: [String!]!
  secret: String
  headers: JSON
  lastDeliveryAt: DateTime
  lastDeliveryStatus: Int
  failureCount: Int
  createdAt: DateTime
  updatedAt: DateTime
  createdBy: String
  updatedBy: String
}

# ---------------------------------------------------------------------------
# Common
# ---------------------------------------------------------------------------

type Address {
  line1: String
  line2: String
  city: String
  state: String
  zip: String
  country: String
}

# ---------------------------------------------------------------------------
# Pagination
# ---------------------------------------------------------------------------

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  totalCount: Int
}

type PatientConnection {
  edges: [PatientEdge!]
  pageInfo: PageInfo!
}

type PatientEdge {
  node: Patient!
  cursor: String!
}

type AppointmentConnection {
  edges: [AppointmentEdge!]
  pageInfo: PageInfo!
}

type AppointmentEdge {
  node: Appointment!
  cursor: String!
}

type EncounterConnection {
  edges: [EncounterEdge!]
  pageInfo: PageInfo!
}

type EncounterEdge {
  node: Encounter!
  cursor: String!
}

type ClaimConnection {
  edges: [ClaimEdge!]
  pageInfo: PageInfo!
}

type ClaimEdge {
  node: Claim!
  cursor: String!
}

# ---------------------------------------------------------------------------
# Root Operations
# ---------------------------------------------------------------------------

type Query {
  # Practices
  practice(practiceId: String!): Practice
  practices(first: Int, after: String): [Practice!]

  # Providers
  provider(practiceId: String!, providerId: String!): Provider
  providers(practiceId: String!, departmentId: String, first: Int, after: String): [Provider!]

  # Patients
  patient(practiceId: String!, patientId: String!): Patient
  patients(practiceId: String!, search: String, first: Int, after: String): PatientConnection
  patientByMrn(practiceId: String!, mrn: String!): Patient
  patientByDemographics(practiceId: String!, firstName: String!, lastName: String!, dateOfBirth: Date!): [Patient!]

  # Appointments
  appointment(practiceId: String!, appointmentId: String!): Appointment
  appointments(practiceId: String!, patientId: String, providerId: String, startDate: Date, endDate: Date, status: AppointmentStatus, first: Int, after: String): AppointmentConnection
  openAppointmentSlots(practiceId: String!, departmentId: String!, appointmentTypeId: String!, startDate: Date!, endDate: Date, providerId: String): [OpenAppointmentSlot!]
  appointmentTypes(practiceId: String!, departmentId: String): [AppointmentType!]

  # Encounters
  encounter(practiceId: String!, encounterId: String!): Encounter
  encounters(practiceId: String!, patientId: String, providerId: String, startDate: Date, endDate: Date, first: Int, after: String): EncounterConnection

  # Clinical
  problems(practiceId: String!, patientId: String!): [Problem!]
  allergies(practiceId: String!, patientId: String!): [Allergy!]
  vitals(practiceId: String!, patientId: String!, encounterId: String): [VitalSet!]
  immunizations(practiceId: String!, patientId: String!): [Immunization!]

  # Labs
  labOrder(practiceId: String!, labOrderId: String!): LabOrder
  labOrders(practiceId: String!, patientId: String!, startDate: Date, endDate: Date): [LabOrder!]
  labResult(practiceId: String!, resultId: String!): LabResult

  # Medications
  prescriptions(practiceId: String!, patientId: String!, active: Boolean): [Prescription!]
  medicationOrders(practiceId: String!, patientId: String!, encounterId: String): [MedicationOrder!]

  # Documents
  document(practiceId: String!, documentId: String!): Document
  documents(practiceId: String!, patientId: String!, documentTypeId: String, status: DocumentStatus): [Document!]

  # Charts
  chart(practiceId: String!, patientId: String!): Chart
  healthSummary(practiceId: String!, patientId: String!): HealthSummary
  clinicalSummary(practiceId: String!, encounterId: String!): ClinicalSummary
  ccda(practiceId: String!, patientId: String!, encounterId: String): CCDA

  # Insurance & Billing
  patientInsurance(practiceId: String!, patientId: String!): [PatientInsurance!]
  insurancePayers(practiceId: String!, search: String): [InsurancePayer!]
  claim(practiceId: String!, claimId: String!): Claim
  claims(practiceId: String!, patientId: String, startDate: Date, endDate: Date, status: ClaimStatus, first: Int, after: String): ClaimConnection
  payments(practiceId: String!, patientId: String, claimId: String, startDate: Date, endDate: Date): [Payment!]

  # Messaging & Portal
  patientMessages(practiceId: String!, patientId: String!, status: MessageStatus): [PatientMessage!]
  portalAccount(practiceId: String!, patientId: String!): Portal

  # Scheduling
  schedule(practiceId: String!, scheduleId: String!): Schedule
  schedules(practiceId: String!, providerId: String, departmentId: String): [Schedule!]
  availability(practiceId: String!, providerId: String!, departmentId: String!, date: Date!): Availability

  # Auth
  apiKeys(practiceId: String): [APIKey!]
  webhooks(practiceId: String!): [Webhook!]

  # FHIR
  fhirResource(practiceId: String!, resourceType: FHIRResourceType!, resourceId: String!): FHIR
}

type Mutation {
  # Patients
  createPatient(practiceId: String!, input: CreatePatientInput!): Patient
  updatePatient(practiceId: String!, patientId: String!, input: UpdatePatientInput!): Patient

  # Appointments
  bookAppointment(practiceId: String!, input: BookAppointmentInput!): Appointment
  cancelAppointment(practiceId: String!, appointmentId: String!, reason: String): Appointment
  rescheduleAppointment(practiceId: String!, appointmentId: String!, newDateTime: DateTime!): Appointment
  checkInAppointment(practiceId: String!, appointmentId: String!): Appointment
  checkOutAppointment(practiceId: String!, appointmentId: String!): Appointment

  # Encounters
  createEncounter(practiceId: String!, input: CreateEncounterInput!): Encounter
  closeEncounter(practiceId: String!, encounterId: String!): Encounter

  # Clinical
  addProblem(practiceId: String!, patientId: String!, input: AddProblemInput!): Problem
  updateProblem(practiceId: String!, problemId: String!, input: UpdateProblemInput!): Problem
  addAllergy(practiceId: String!, patientId: String!, input: AddAllergyInput!): Allergy
  updateAllergy(practiceId: String!, allergyId: String!, input: UpdateAllergyInput!): Allergy
  recordVitals(practiceId: String!, patientId: String!, encounterId: String!, input: RecordVitalsInput!): VitalSet
  addImmunization(practiceId: String!, patientId: String!, input: AddImmunizationInput!): Immunization

  # Labs
  createLabOrder(practiceId: String!, input: CreateLabOrderInput!): LabOrder

  # Medications
  createPrescription(practiceId: String!, input: CreatePrescriptionInput!): Prescription
  cancelPrescription(practiceId: String!, prescriptionId: String!, reason: String): Prescription

  # Documents
  uploadDocument(practiceId: String!, patientId: String!, input: UploadDocumentInput!): Document

  # Insurance
  addPatientInsurance(practiceId: String!, patientId: String!, input: AddInsuranceInput!): PatientInsurance
  updatePatientInsurance(practiceId: String!, insuranceId: String!, input: UpdateInsuranceInput!): PatientInsurance

  # Messaging
  sendPatientMessage(practiceId: String!, input: SendMessageInput!): PatientMessage

  # Webhooks
  createWebhook(practiceId: String!, input: CreateWebhookInput!): Webhook
  updateWebhook(practiceId: String!, webhookId: String!, input: UpdateWebhookInput!): Webhook
  deleteWebhook(practiceId: String!, webhookId: String!): Boolean
}

