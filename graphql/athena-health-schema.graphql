"""
Athenahealth athenaOne GraphQL Schema
Conceptual schema modelling the athenaOne REST API and FHIR R4 surface.
Base REST API: https://api.platform.athenahealth.com/v1/{practiceid}
FHIR R4 API:  https://api.platform.athenahealth.com/fhir/r4
Auth: OAuth 2.0 client_credentials (SMART on FHIR for FHIR endpoints)
"""

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

scalar Date
scalar DateTime
scalar JSON

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

enum AppointmentStatus {
  OPEN
  BOOKED
  CHECKED_IN
  CHECKED_OUT
  CANCELLED
  RESCHEDULED
  NO_SHOW
  FUTURE
  CHARGE_ENTERED
}

enum Gender {
  MALE
  FEMALE
  OTHER
  UNKNOWN
}

enum DocumentStatus {
  OPEN
  CLOSED
  DELETED
  ERROR
}

enum LabResultStatus {
  FINAL
  PRELIMINARY
  CORRECTED
  CANCELLED
  PENDING
}

enum MessageStatus {
  OPEN
  CLOSED
  DRAFT
  SENT
}

enum ClaimStatus {
  OPEN
  SUBMITTED
  ACCEPTED
  REJECTED
  PAID
  DENIED
  VOIDED
  CLOSED
}

enum ChargeStatus {
  OPEN
  POSTED
  VOID
  MOVED
}

enum PaymentMethod {
  CASH
  CHECK
  CREDIT_CARD
  ELECTRONIC
  OTHER
}

enum FHIRResourceType {
  PATIENT
  ENCOUNTER
  OBSERVATION
  CONDITION
  MEDICATION_REQUEST
  ALLERGY_INTOLERANCE
  DOCUMENT_REFERENCE
  DIAGNOSTIC_REPORT
  CARE_PLAN
  GOAL
  IMMUNIZATION
  PROCEDURE
}

enum WebhookStatus {
  ACTIVE
  INACTIVE
  ERROR
}

# ---------------------------------------------------------------------------
# Interfaces
# ---------------------------------------------------------------------------

interface Node {
  id: ID!
}

interface Auditable {
  createdAt: DateTime
  updatedAt: DateTime
  createdBy: String
  updatedBy: String
}

# ---------------------------------------------------------------------------
# Practice & Provider
# ---------------------------------------------------------------------------

type Practice implements Node & Auditable {
  id: ID!
  practiceId: String!
  name: String!
  displayName: String
  npi: String
  taxId: String
