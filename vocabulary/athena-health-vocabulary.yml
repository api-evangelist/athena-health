aid: athena-health
name: athenahealth Vocabulary
description: |
  Operational and capability vocabulary for the athenahealth API surface.
  Combines athenaOne proprietary resources, FHIR R4 / US Core profiles, FHIR
  Subscriptions (R5 Backport), Bulk Data Access, and CDS Hooks.
