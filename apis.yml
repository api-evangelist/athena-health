description: athenahealth is a cloud-based electronic health record (EHR), revenue
  cycle management, and practice management platform serving ambulatory practices,
  hospitals, and health systems across the United States. The athenaOne platform spans
  patient engagement, scheduling, clinical documentation, ordering, e-prescribing,
  population health, and billing/claims. The athenahealth API surface exposes both
  a proprietary REST API and a Cures Act-certified FHIR R4 server with US Core / USCDI
  conformance, FHIR Subscriptions for event-driven webhooks, FHIR Bulk Data ($export)
  for population-scale data sharing, and CDS Hooks for embedded clinical decision
  support. The company is privately held by Veritas Capital and Hellman & Friedman
  following the 2022 take-private acquisition.
